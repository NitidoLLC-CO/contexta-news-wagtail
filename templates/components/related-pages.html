{% load wagtailcore_tags %}

{% if page.related_pages %}
<section class="cx-related">
    <div class="cx-container">
        <div class="cx-section-heading">
            <p>Related Intelligence</p>
            <h2>{% firstof page.featured_section_title "Read next" %}</h2>
        </div>
        <div class="cx-related__rail">
            {% for related_page in page.related_pages.specific %}
                {% include "components/card.html" with page=related_page %}
            {% endfor %}
        </div>
    </div>
</section>
{% endif %}
