{% load wagtailcore_tags %}
{% wagtail_site as current_site %}

<footer class="cx-footer">
    <div class="cx-container cx-footer__grid">
        <div>
            <p class="cx-kicker">CONTEXTRA News</p>
            <h2>AI intelligence for public decision makers.</h2>
        </div>
        <div class="cx-footer__links" aria-label="Footer navigation">
            <a href="/news/?topic=ai">AI</a>
            <a href="/news/?topic=policy">Policy</a>
            <a href="/news/?topic=companies">Companies</a>
            <a href="{% url 'search' %}">Search</a>
        </div>
        <div class="cx-footer__contact">
            <span>@contextra.news</span>
            <span>Signal desk: global</span>
        </div>
    </div>
    <div class="cx-container cx-footer__bottom">
        <span>&copy; {% now "Y" %} {{ current_site.site_name|default:"CONTEXTRA News" }}</span>
        <span>Monolithic Wagtail newsroom platform</span>
    </div>
</footer>
