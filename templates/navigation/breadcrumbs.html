{% load wagtailcore_tags %}

{% if page.get_ancestors|length > 1 %}
    <nav aria-label="Breadcrumb" class="cx-breadcrumbs">
        <ol>
            {% for ancestor_page in page.get_ancestors.specific %}
                {% if not ancestor_page.is_root %}
                    <li>
                        <a href="{% pageurl ancestor_page %}">{% firstof ancestor_page.listing_title ancestor_page.title %}</a>
                    </li>
                    <li aria-hidden="true"><span>/</span></li>
                {% endif %}
            {% endfor %}
        </ol>
    </nav>
{% endif %}
